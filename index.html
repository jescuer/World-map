<!doctype html><html lang="es"><head>  <meta charset="utf-8" />  <meta name="viewport" content="width=device-width,initial-scale=1" />  <title>Mapamundi autoplay (CSV)</title>  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />  <style>    html, body { height: 100%; margin: 0; }    #map { height: 100vh; width: 100vw; background:#e5e7eb; }    /* Pequeño indicador opcional (esquina) */   / .status {      position: fixed; top: 10px; left: 10px; z-index: 9999;      background: rgba(255,255,255,.9);      padding: 6px 10px;      border-radius: 10px;      font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;      box-shadow: 0 8px 24px rgba(0,0,0,.15);      max-width: 40vw;      white-space: nowrap;      overflow: hidden;      text-overflow: ellipsis;    }/    .status.hidden { display: none; } /* ponlo visible/oculto según quieras */  </style></head><body>  <div id="map"></div>  <div id="status" class="status">Iniciando…</div>  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>  <script>    /***********************     * CONFIG     ***********************/    const CSV_URL = "paises.csv";      // archivo en la misma carpeta    const INTERVAL_MS = 200;           // 0,2 segundos    const SHOW_STATUS = true;          // cambia a false si no quieres ni el indicador    const GEO_URL = "https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json";    // Alias opcionales (si tu CSV usa nombres distintos a los del GeoJSON)    const aliases = {      // "USA": "United States of America",      // "UK": "United Kingdom",      // "España": "Spain"    };    const normalizeName = (name) => (aliases[name] ?? name);    /***********************     * UI mínima (opcional)     ***********************/    const statusEl = document.getElementById("status");    if (!SHOW_STATUS) statusEl.classList.add("hidden");    function setStatus(msg){      if (SHOW_STATUS) statusEl.textContent = msg;    }    /***********************     * CSV parser simple     * - soporta con o sin cabecera     * - separador , o ;     * - columna "country"/"pais"/"país" si existe, si no: primera columna     ***********************/    function parseCSV(text){      const lines = text        .split(/\r?\n/)        .map(l => l.trim())        .filter(l => l && !l.startsWith("#"));      if (!lines.length) return [];      const sep = (lines[0].includes(";") && !lines[0].includes(",")) ? ";" : ",";      const header = lines[0].split(sep).map(s => s.trim().toLowerCase());      const hasHeader = header.includes("country") || header.includes("pais") || header.includes("país");      let startIdx = 0;      let countryCol = 0;      if (hasHeader){        startIdx = 1;        countryCol = header.indexOf("country");        if (countryCol === -1) countryCol = header.indexOf("pais");        if (countryCol === -1) countryCol = header.indexOf("país");        if (countryCol === -1) countryCol = 0;      }      const out = [];      for (let i = startIdx; i < lines.length; i++){        const cols = lines[i].split(sep).map(s => s.trim());        const val = (cols[countryCol] ?? cols[0] ?? "").replace(/^"|"$/g, "");        if (val) out.push(val);      }      return out;    }    async function loadSequenceFromCSV(url){      const r = await fetch(url, { cache: "no-store" });      if (!r.ok) throw new Error(`No se pudo cargar ${url} (HTTP ${r.status})`);      const text = await r.text();      return parseCSV(text);    }    /***********************     * MAPA BASE     ***********************/    const map = L.map("map").setView([20, 0], 2);    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {      maxZoom: 19,      attribution: "&copy; OpenStreetMap contributors"    }).addTo(map);    setTimeout(() => map.invalidateSize(), 0);    /***********************     * ESTILOS (muy visibles)     ***********************/    const styleHidden = {      weight: 0,      opacity: 0,      fillOpacity: 0    };    const styleVisible = {      weight: 1.5,      opacity: 0.9,      color: "#00accf",      fillColor: "#00accf",      fillOpacity: 0.65    };    const styleHighlighted = {      weight: 2.5,      opacity: 1,      color: "#00accf",      fillColor: "#00accf",      fillOpacity: 0.75    };    /***********************     * ESTADO PERSISTENTE     ***********************/    let sequence = [];    let geoLayer = null;    const byName = new Map();    const revealed = new Set();    let currentName = null;    function styleByState(feature){      const name = feature?.properties?.name;      if (!name) return styleHidden;      if (revealed.has(name)){        return (name === currentName) ? styleHighlighted : styleVisible;      }      return styleHidden;    }    function renderStyles(){      if (!geoLayer) return;      geoLayer.setStyle(styleByState);    }    /***********************     * AUTOPLAY     ***********************/    let i = 0;    let timer = null;    function startAuto(){      stopAuto();      i = 0;      timer = setInterval(() => {        if (i >= sequence.length){          stopAuto();          setStatus(`Finalizado ✅ (${sequence.length} países)`);          return;        }        const raw = sequence[i];        const name = normalizeName(raw);        if (byName.has(name)){          revealed.add(name);          currentName = name;          renderStyles();          setStatus(`Mostrando: ${raw}  (${i+1}/${sequence.length})`);        } else {          // si no coincide, no lo añadimos: avisamos (sin parar)          setStatus(`No encontrado: ${raw}  (${i+1}/${sequence.length})`);        }        i++;      }, INTERVAL_MS);    }    function stopAuto(){      if (timer){        clearInterval(timer);        timer = null;      }    }    /***********************     * INIT: cargar GeoJSON + CSV y arrancar     ***********************/    async function init(){      try {        setStatus("Cargando fronteras…");        const geoResp = await fetch(GEO_URL);        if (!geoResp.ok) throw new Error("GeoJSON HTTP " + geoResp.status);        const geojson = await geoResp.json();        geoLayer = L.geoJSON(geojson, {          style: styleByState,          onEachFeature: (feature, layer) => {            const name = feature?.properties?.name;            if (name) byName.set(name, layer);          }        }).addTo(map);        // Todo oculto al inicio        revealed.clear();        currentName = null;        renderStyles();        setStatus("Cargando CSV…");        sequence = await loadSequenceFromCSV(CSV_URL);        if (!sequence.length){          setStatus("CSV vacío. Revisa paises.csv");          return;        }        // Validación rápida (opcional)        const missing = sequence.map(normalizeName).filter(n => !byName.has(n));        if (missing.length){          console.warn("No coinciden (primeros 20):", missing.slice(0,20));        }        setStatus(`OK. Arrancando autoplay (${INTERVAL_MS}ms)…`);        startAuto();      } catch (e){        console.error(e);        setStatus("Error inicializando. Revisa consola (F12).");      }    }    init();  </script></body></html>
